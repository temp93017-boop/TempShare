<!doctype html>
<html>
<head>
  <meta charset="utf-8">
</head>
<body style="margin:0">

<iframe id="pdf" style="width:100%;height:100vh;border:none"></iframe>

<script>
const p = new URLSearchParams(location.search);
const file = p.get("file");

if (!file) {
  document.body.innerHTML = "missing file";
} else {
  const url = "./" + file + location.hash;
  document.getElementById("pdf").src = url;
}
</script>

</body>
</html>
