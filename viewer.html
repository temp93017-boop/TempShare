<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>PDF Viewer</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<iframe id="frame"></iframe>

<script>
  const params = new URLSearchParams(window.location.search);
  const file = params.get("file");

  if (!file) {
    document.body.innerHTML = "Missing file parameter";
  } else {
    const hash = window.location.hash || "";
    const url = "./" + file + hash;
    document.getElementById("frame").src = url;
  }
</script>

</body>
</html>
