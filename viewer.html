<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>PDF Viewer</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<iframe id="pdf"></iframe>

<script>
  const params = new URLSearchParams(window.location.search);
  const file = params.get("file");
  const page = window.location.hash || "#page=1";

  const base = "https://temp93017-boop.github.io/TempShare/";
  const url = base + file + page;

  document.getElementById("pdf").src = url;
</script>

</body>
</html>
